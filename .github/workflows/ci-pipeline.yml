name: Full-Stack CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- BACKEND BUILD JOB ---
  build-backend:
    name: Build & Verify Backend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Dependencies
      run: dotnet restore ./backend/MyApi.csproj

    - name: Build Backend Service
      run: dotnet build ./backend/MyApi.csproj --configuration Release --no-restore

    - name: Test Dockerizing Backend
      run: |
        docker build -t backend-test:latest ./backend

  # --- FRONTEND BUILD JOB ---
  build-frontend:
    name: Build & Verify Frontend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install Frontend Dependencies
      run: npm ci --prefix ./frontend

    - name: Compile Production Assets
      run: npm run build --prefix ./frontend

    - name: Test Dockerizing Frontend
      run: |
        docker build -t frontend-test:latest \
          --build-arg VITE_API_URL=http://localhost:5000 \
          ./frontend

  # --- ORCHESTRATION VERIFICATION JOB ---
  verify-orchestration:
    name: Verify Docker Compose Architecture
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Validate Compose File Syntax
      run: docker compose config

    - name: Build Stack Using Compose
      run: docker compose build