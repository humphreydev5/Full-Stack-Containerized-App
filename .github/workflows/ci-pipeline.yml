name: Full-Stack CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Global Environment Variables to optimize runners
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # --- BACKEND BUILD JOB ---
  build-backend:
    name: Build & Verify Backend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # Using wildcard checks to ensure compilation targets are caught regardless of path case sensitivity
    - name: Restore Dependencies
      run: |
        cd backend || cd Backend || exit 1
        dotnet restore *.csproj

    - name: Build Backend Service
      run: |
        cd backend || cd Backend || exit 1
        dotnet build *.csproj --configuration Release --no-restore

    - name: Test Dockerizing Backend
      run: |
        cd backend || cd Backend || exit 1
        docker build -t backend-test:latest .

  # --- FRONTEND BUILD JOB ---
  build-frontend:
    name: Build & Verify Frontend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    # Navigates to directory structurally to prevent cache mapping route errors
    - name: Install Frontend Dependencies
      run: |
        cd frontend || cd Frontend || exit 1
        npm install

    - name: Compile Production Assets
      run: |
        cd frontend || cd Frontend || exit 1
        npm run build

    - name: Test Dockerizing Frontend
      run: |
        cd frontend || cd Frontend || exit 1
        docker build -t frontend-test:latest \
          --build-arg VITE_API_URL=http://localhost:5000 \
          .

  # --- ORCHESTRATION VERIFICATION JOB ---
  verify-orchestration:
    name: Verify Docker Compose Architecture
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Validate Compose File Syntax
      run: docker compose config

    - name: Build Stack Using Compose
      run: docker compose build