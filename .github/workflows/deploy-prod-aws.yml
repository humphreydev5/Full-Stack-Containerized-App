name: Production Secure CD to AWS ECS

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECS_CLUSTER: prod-gatherly-cluster
  BACKEND_SERVICE: backend-service
  FRONTEND_SERVICE: frontend-service
  BACKEND_ECR_REPO: gatherly-backend
  FRONTEND_ECR_REPO: gatherly-frontend

jobs:
  deploy:
    name: Build, Secure, and Deploy to ECS
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout Source Code (Upgraded to v4 to ensure latest sub-dependencies)
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Prevent Linux Case-Sensitivity Failures
    - name: Standardize Case Sensitivity Paths
      run: |
        if [ -d "Backend" ]; then mv Backend backend; fi
        if [ -d "Frontend" ]; then mv Frontend frontend; fi

    # 3. Authenticate with AWS securely via GitHub Secrets (Upgraded to v5 for native Node 24 support)
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v5
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # 4. Authenticate Docker CLI with your Private ECR Registry
    - name: Log in to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 5. Build, Tag, and Push Production Images to Amazon ECR
    - name: Build, Tag, and Push Images to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd backend
        docker build -t $ECR_REGISTRY/$BACKEND_ECR_REPO:$IMAGE_TAG -t $ECR_REGISTRY/$BACKEND_ECR_REPO:latest .
        docker push $ECR_REGISTRY/$BACKEND_ECR_REPO --all-tags
        cd ..

        cd frontend
        docker build -t $ECR_REGISTRY/$FRONTEND_ECR_REPO:$IMAGE_TAG -t $ECR_REGISTRY/$FRONTEND_ECR_REPO:latest \
          --build-arg VITE_API_URL=https://api.yourproductiondomain.com .
        docker push $ECR_REGISTRY/$FRONTEND_ECR_REPO --all-tags

    # 6. Fetch AWS Account ID on the fly to prevent hardcoding role IDs
    - name: Get AWS Account ID
      id: get-account
      run: |
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV

# 7. Substitute placeholders inside your infrastructure task templates
    - name: Inject Active Account ID Into Task Layouts
      run: |
        sed -i "s/\${AWS_ACCOUNT_ID}/${{ env.ACCOUNT_ID }}/g" task-def-backend.json
        sed -i "s/\${AWS_ACCOUNT_ID}/${{ env.ACCOUNT_ID }}/g" task-def-frontend.json

    # NEW STEP: Automatically provision CloudWatch log groups if they are missing
    - name: Pre-Provision CloudWatch Log Streams
      run: |
        aws logs create-log-group --log-group-name /ecs/backend-service || true
        aws logs create-log-group --log-group-name /ecs/frontend-service || true

    # 8. Render the new cryptographic ECR Image Tags into the Backend definition template
    - name: Render Backend Task Definition
      id: render-backend
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-def-backend.json
        container-name: backend-container
        image: ${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPO }}:${{ github.sha }}

    # 9. Render the new cryptographic ECR Image Tags into the Frontend definition template
    - name: Render Frontend Task Definition
      id: render-frontend
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-def-frontend.json
        container-name: frontend-container
        image: ${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_ECR_REPO }}:${{ github.sha }}

    # 10. Execute rolling Zero-Downtime Blue/Green Upgrade for the Backend Service
    - name: Deploy Backend to Amazon ECS
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.render-backend.outputs.task-definition }}
        service: ${{ env.BACKEND_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true

    # 11. Execute rolling Zero-Downtime Blue/Green Upgrade for the Frontend Service
    - name: Deploy Frontend to Amazon ECS
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.render-frontend.outputs.task-definition }}
        service: ${{ env.FRONTEND_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
